name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build iOS Simulator App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader

      - name: Build
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | tee build/xcodebuild.log

      - name: Package simulator app
        if: success()
        run: |
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/EnglishReader.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/EnglishReader-simulator-app.zip

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishReader-iOS-simulator
          path: |
            build/EnglishReader-simulator-app.zip
            build/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7
