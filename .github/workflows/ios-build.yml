name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build iOS Simulator App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader

      - name: Build full offline dictionary
        run: |
          mkdir -p build
          curl -L https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.csv \
            -o build/ecdict.csv
          python3 Scripts/build_dictionary.py \
            build/ecdict.csv \
            EnglishReader/Resources/dictionary_seed.json

      - name: Build
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | tee build/xcodebuild.log

      - name: Package simulator app
        if: success()
        run: |
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/EnglishReader.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/EnglishReader-simulator-app.zip

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishReader-iOS-simulator
          path: |
            build/EnglishReader-simulator-app.zip
            build/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7

  build-unsigned-device-ipa:
    name: Build Unsigned Device IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader

      - name: Build full offline dictionary
        run: |
          mkdir -p build
          curl -L https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.csv \
            -o build/ecdict.csv
          python3 Scripts/build_dictionary.py \
            build/ecdict.csv \
            EnglishReader/Resources/dictionary_seed.json

      - name: Build unsigned app for device
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project EnglishReader.xcodeproj \
            -scheme EnglishReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedDataDevice \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee build/xcodebuild-device.log

      - name: Package unsigned IPA
        if: success()
        run: |
          APP_PATH="build/DerivedDataDevice/Build/Products/Release-iphoneos/EnglishReader.app"
          test -d "$APP_PATH"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          ditto -c -k --sequesterRsrc --keepParent build/Payload build/EnglishReader-unsigned-device.ipa

      - name: Upload unsigned IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EnglishReader-unsigned-device-ipa
          path: |
            build/EnglishReader-unsigned-device.ipa
            build/xcodebuild-device.log
          if-no-files-found: ignore
          retention-days: 7
